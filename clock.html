<!DOCTYPE html>
<html>
    <head>
        <title>Clock</title>
        <style>
            body {
                font-family:system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
                color:darkred;
                background-color: lightgoldenrodyellow;
            }
            h1{
                font-size:40pt;
            }
            .hand{
                left:50%;
                bottom:50%;
                transform-origin: bottom;
                position:absolute;
              transform: rotate(0deg);
            }
            .hourHand{
                width: 2px;
                height: 50px;
               background-color: darkblue;
            }
            .minuteHand{
                width: 2px;
                height: 70px;
               background-color: orange;
            }
            .secondHand{
                width: 2px;
                height: 90px;
               background-color: red;
            }
            #displayBox{
                float:center;
                height:40px;
                font-size:40px;
            }
        </style>
    </head>
    <body>
        <h1>Clock</h1>
        <div id="clock" class="circularClock"></div>
        <div class="hand hourHand" id="handHour"></div>
        <div class="hand minuteHand" id="handMinute"></div>
        <div class="hand secondHand" id="handSecond"></div>
        <div id="displayBox"></div>
        <script>
            function workingClock(){
                const seconds = new Date().getSeconds();
                const minutes = new Date().getMinutes();
                const hours = new Date().getHours();
                const secondHand = document.getElementById("handSecond");
                const minuteHand = document.getElementById("handMinute");   
                const hourHand = document.getElementById("handHour");
                const secondDegree = seconds * 6;
                const minuteDegree = minutes * 6 + seconds * 0.1;
                const hourDegree = hours * 30 + minutes * 0.5;
                secondHand.style.transform = `rotate(${secondDegree}deg)`;
                minuteHand.style.transform = `rotate(${minuteDegree}deg)`;
                hourHand.style.transform = `rotate(${hourDegree}deg)`;
                
            }
            workingClock();
            setInterval(workingClock, 1000);
            function digitalClock(){
                const seconds = new Date().getSeconds();
                const minutes = new Date().getMinutes();
                const hours = new Date().getHours();
                document.getElementById("displayBox").innerText = hours + ":" + minutes+ ":" + seconds;
            }
            digitalClock();
            setInterval(digitalClock,1000);
        </script>
    </body>
</html>
