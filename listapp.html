<!DOCTYPE html>
<html>
    <head>
        <title>To-do List App</title>
        <style>
            body{
                background-color:lightblue;
                color:darkblue;
                font-family: Arial, Helvetica, sans-serif;
                text-align: left;
                padding:100px;

            }
            h1{
                font-size: 40px;
            }
            input[type="text"]{
                padding:10px;
                width:40%;
                background-color:cyan;
                color:black
            }
            input[type="button"]{
                background-color: aqua;
                color: black;
            }
        </style>
        <script>
            function addTask() {
            var newDiv = document.createElement("div");
            newDiv.innerHTML = document.getElementById("space").value;
            newDiv.onclick = removeDiv;
            document.getElementById("list").appendChild(newDiv);
            saveList();
            }
            function removeDiv() {
                document.getElementById("list").removeChild(this);
                saveList();
            }
            function saveList() {
                localStorage.storageSpace = document.getElementById("list").innerHTML;
            }
            function loadList(){
                document.getElementById("list").innerHTML = localStorage.storageSpace;
                for(var i = 0; i < list.children.length; i++){
                    document.getElementById("list").children[i].onclick = removeDiv;
                }
            }        
        </script>
    </head>
    <body>
        <h1>To - do  List app to Simplify your Needs!!</h1>
        <input type="text" id="space" value="Type here to add task" />
        <input type="button" value="Add Task" onclick="addTask();" value="Add task"/>
        <div id="list" ></div>
        <script>
            if(localStorage.storageSpace){
                loadList();
            }
        </script>
    </body>
</html>
