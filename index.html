<!DOCTYPE html>
<html>
    <head>
        <title>Search World</title>
        <script>
            function search(){
                var searchInput = document.getElementById("searchInput").value;
                if (searchInput.includes("weather")){
                    window.open("https://weather.com/");
                }
                if (searchInput.includes("time") || searchInput.includes("clock")){
                    window.open("https://search-world-coder.github.io/searchworld/clock.html");
                }
                if (searchInput.includes("directions")){
                    window.open("https://www.google.com/maps");
                }
                if (searchInput.includes("game")){
                    window.open("https://search-world-coder.github.io/searchworld/noughtsandcrosses.html");
                }
                if (searchInput == ""){
                    alert("Please enter a search term.");
                }
                if (searchInput.includes("calculator")){
                    window.open("https://search-world-coder.github.io/searchworld/calculator.html");
                }
                if (searchInput.includes("stopwatch")){
                    window.open("https://search-world-coder.github.io/searchworld/stopwatch.html");
                }
                if(searchInput.includes("chat")){
                    window.open("https://search-world-coder.github.io/searchworld/chat.html");
                }
                if(searchInput.includes("todo") || searchInput.includes("list")){
                    window.open("https://search-world-coder.github.io/searchworld/listapp.html");
                }
                if(searchInput.includes("music")){
                    window.open("https://search-world-coder.github.io/searchworld/music.html");
                }
                if(searchInput.includes("mole calculator") || searchInput.includes("chemistry") || searchInput.includes("mole")){
                    window.open("https://search-world-coder.github.io/searchworld/moleCalculator.html");
                }
                if(searchInput.includes("rock paper scissors") ||searchInput.includes("integers rock paper scissors") || searchInput.includes("integers rps")){
                    window.open("https://search-world-coder.github.io/searchworld/integersRockPaperScissors.html");
                }

            }
            function search2(){
                var searchInput2 = document.getElementById("searchInput2").value;
                if(searchInput2 == ""){
                    alert("Please enter a search term.");
                } else {
                    window.open("https://www.google.com/search?q=" + searchInput2);              
                }
            }
        </script>
        <style>
            body{
                background-color:plum;
                color: purple;
                font-family:xyz ;
            }
             input[type="text"] {
                padding: 10px;
                width: 50%;
                background-color:violet;
            }
            #searchButtons {
                padding: 10px 20px;
                background-color:orchid;
                color: black;
                width:25%;
                height:10%;
            }
            #heading{
                font-size: 30px;
                color:black;
            }
            input[type="button"]{
                background-color: violet;
            }
        </style>
    </head>
    <body>
        <h1>Search World</h1>
        <h2>We are committed to providing the best search experience with free 
            web apps.
        </h2>
        <h2 id="heading">Welcome to the Web App Arena!</h2>
        <input type="button" id="searchButtons"value="To-Do List App" onclick="window.open('https://search-world-coder.github.io/searchworld/listapp.html')"/>
        <input type="button" id="searchButtons"value="Music App" onclick="window.open('https://search-world-coder.github.io/searchworld/music.html')"/>
        <input type="button" id="searchButtons"value="Mole Calculator" onclick="window.open('https://search-world-coder.github.io/searchworld/moleCalculator.html')"/>
        <input type="button" id="searchButtons"value="Rock Paper Scissors" onclick="window.open('https://search-world-coder.github.io/searchworld/integersrockpaperscissors.html')"/>
        <input type="button" id="searchButtons"value="Stopwatch" onclick="window.open('https://search-world-coder.github.io/searchworld/stopwatch.html')"/>
        <input type="button" id="searchButtons"value="Chat App" onclick="window.open('https://search-world-coder.github.io/searchworld/chat.html')"/>
        <input type="button" id="searchButtons"value="Clock" onclick="window.open('https://search-world-coder.github.io/searchworld/clock.html')"/>
        <input type="button" id="searchButtons"value="Weather" onclick="window.open('https://weather.com/')"/>
        <input type="button" id="searchButtons"value="Calculator" onclick="window.open('https://search-world-coder.github.io/searchworld/calculator.html')"/>
        <input type="button" id="searchButtons"value="Noughts and Crosses" onclick="window.open('https://search-world-coder.github.io/searchworld/noughtsandcrosses.html')"/>
        <input type="button" id="searchButtons"value="Directions" onclick="window.open('https://www.google.com/maps')"/> 
        <h2 id="heading">Welcome to the Search World Mania!</h2>
        <h2>If you want to make a search type here:</h2>
        <input type="text" id="searchInput2" placeholder="Type your search here..."/>
        <input type="button" value="Search" onclick="search2()"/>  
    </body>
</html>
