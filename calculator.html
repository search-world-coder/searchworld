<!DOCTYPE html>
<html>
    <head>
        <title>Calculator</title>
        <style>
            body{
                background-color:skyblue;
                color:black;
            }
            input[type="text"] {
                margin:15px;
                background-color:paleturquoise;
                color:black;
                width:400px;
                height:40px;
            }
            input[type="button"] {
                background-color:paleturquoise;
                color:black;
                border-radius: 50%;
                height:75px;
                width:75px;
            }
            .row div{
                width: 70px;
                height: 70px;
                float: left;
                text-align: center;
                line-height: 70px;
                padding:20px;
            }
            .row{
                clear:both;
            }
        </style>
        <script>
            function displayPlus() {
                    document.getElementById("inputValue").value += "+";
                }
                function displayMinus() {
                    document.getElementById("inputValue").value += "-";
                } 
                function displayMultiply() {
                    document.getElementById("inputValue").value += "*";
                }
                function displayDivide() {
                    document.getElementById("inputValue").value += "/";
                }
                function display1() {
                    document.getElementById("inputValue").value += "1";
                }
                function display2() {
                    document.getElementById("inputValue").value += "2";
                }
                function display3() {
                    document.getElementById("inputValue").value += "3";
                }
                function display4() {
                    document.getElementById("inputValue").value += "4";
                }
                function display5() {
                    document.getElementById("inputValue").value += "5";
                }
                function display6() {
                    document.getElementById("inputValue").value += "6";
                }
                function display7() {
                    document.getElementById("inputValue").value += "7";
                }
                function display8() {
                    document.getElementById("inputValue").value += "8";
                }
                function display9() {
                    document.getElementById("inputValue").value += "9";
                }
                function display0() {
                    document.getElementById("inputValue").value += "0";
                }           
            function calculate() {
               
                var input = document.getElementById("inputValue").value;
                var result = eval(input);
                document.getElementById("inputValue").value = "";
                document.getElementById("inputValue").value = "Answer: " + result;         
            }
            function clearResultSpace() {
                    document.getElementById("inputValue").value = "";
                }
            /*
            function calculateSquareRoot() {
                
                var input = document.getElementById("inputValue").value;
                var result = Math.sqrt(input);
                document.getElementById("resultSpace").value = "Answer: " + result;
            }
            function calculateCubeRoot() {
                
                var input = document.getElementById("inputValue").value;
                var result = Math.cbrt(input);
                document.getElementById("resultSpace").value = "Answer: " + result;
            }
                */

        </script>
    </head>
    <body>
        <input type="text" id="inputValue"/>
        <div>
        <div class="row">
            <div><input type="button" value="AC" onclick="clearResultSpace();"/></div>
            <div><input type="button" value="=" onclick="calculate();"/></div>
            <div><input type="button" value="/" onclick="displayDivide();"/></div>
            <div><input type="button" value="+" onclick="displayPlus();"/></div>
        </div>
        <div class="row">
            <div><input type="button" value="1" onclick="display1();"/></div>
            <div><input type="button" value="2" onclick="display2();"/></div>
            <div><input type="button" value="3" onclick="display3();"/></div>
            <div><input type="button" value="-" onclick="displayMinus();"/></div>
        </div>
        <div class="row">
            <div><input type="button" value="4" onclick="display4();"/></div>
            <div><input type="button" value="5" onclick="display5();"/></div>
            <div><input type="button" value="6" onclick="display6();"/></div>
            <div><input type="button" value="*" onclick="displayMultiply();"/></div>
        </div>
         <div class="row">
            <div><input type="button" value="7" onclick="display7();"/></div>
            <div><input type="button" value="8" onclick="display8();"/></div>
            <div><input type="button" value="9" onclick="display9();"/></div>
            <div><input type="button" value="0" onclick="display0();"/></div>
         </div>
        </div>
    </body>
</html>
