<!DOCTYPE html>
<html>
    <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Snake</title>
    </head>
    <body>
        <canvas id="canvas" width="1024" height="1024"></canvas>
        <script>
            var game = {
                number: 0,
                timer: null,
                board: [
                    "###############",
                    "#             #",
                    "#             #",
                    "#             #",
                    "#    ####     #",
                    "#    ####     #",
                    "#             #",
                    "#             #",
                    "#             #",
                    "###############"
                ],
                tick: function() {
                    game.number++;
                    game.timer = window.setTimeout("game.tick()", 500);
                    graphics.drawGame();
                }
            };
            var snake = {
                parts: [
                    {x: 4, y:2},
                    {x: 3, y:2},
                    {x: 2, y:2}
                ],
                facing: "E",
                moveSnake: function() {
                }
            };
            var graphics = {
                canvas: document.getElementById("canvas"),
                squareSize: 30,
                drawBoard: function(ctx) {
                    var yOffset = 0;
                    game.board.forEach(function lineEach(line) {
                        line = line.split('');
                        var xOffset = 0;
                        line.forEach(function characterEach(character) {
                            if (character === "#") {
                                ctx.fillStyle = "black";
                                ctx.fillRect(xOffset, yOffset, graphics.squareSize, graphics.squareSize);
                            }
                            xOffset += graphics.squareSize;
                        });
                        yOffset += graphics.squareSize;
                    });
                },
                drawSnake: function(ctx) {
                    snake.parts.forEach(function eachpart(part)  {
                        var snakeY = part.y * graphics.squareSize;
                        var snakeX = part.x * graphics.squareSize;
                        ctx.fillStyle = "green";
                        ctx.fillRect(snakeX, snakeY, graphics.squareSize, graphics.squareSize);
                    });
                },
            drawGame: function() {
              var ctx = graphics.canvas.getContext("2d");
              graphics.drawBoard(ctx);
              graphics.drawSnake(ctx);
            }
        };
        var gameControl = {
            startGame: function() {
                game.tick();
            }
        }
        gameControl.startGame();
        </script>
    </body>
</html>
